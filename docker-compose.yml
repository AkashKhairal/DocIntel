services:
  # ------- Backend API -------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docintel-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend-data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONPATH=.
    depends_on:
      - qdrant
      - redis
    restart: unless-stopped
    networks:
      - docintel

  # ------- Celery Worker -------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docintel-worker
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
      - backend-data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONPATH=.
    depends_on:
      - qdrant
      - redis
    restart: unless-stopped
    networks:
      - docintel

  # ------- Frontend -------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docintel-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - docintel

  # ------- Qdrant Vector Database -------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: docintel-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    networks:
      - docintel

  # ------- Redis (Celery Broker) -------
  redis:
    image: redis:7-alpine
    container_name: docintel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - docintel

volumes:
  backend-data:
  qdrant-data:
  redis-data:

networks:
  docintel:
    driver: bridge
